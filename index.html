<html lang="pt-BR">
<head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script>
        AFRAME.registerComponent('mycar', {
            schema: {
                vel: {type: 'number', default: 0.1}
            },

            init: function() {
                this.direcao = {
                    frente: false,
                    tras: false,
                    esquerda: false,
                    direita: false
                }

                this.onKeyDown = this.onKeyDown.bind(this)
                this.onKeyUp = this.onKeyUp.bind(this)

                window.addEventListener('keydown', this.onKeyDown)
                window.addEventListener('keyup', this.onKeyUp)
            },

            onKeyDown: function (e) {
                switch(e.key.toLowerCase()) {
                    case 'w': this.direcao.frente = true; break
                    case 's': this.direcao.tras = true; break
                    case 'a': this.direcao.esquerda = true; break
                    case 'd': this.direcao.direita = true; break
                }
            },
            onKeyUp: function (e) {
                switch(e.key.toLowerCase()) {
                    case 'w': this.direcao.frente = false; break
                    case 's': this.direcao.tras = false; break
                    case 'a': this.direcao.esquerda = false; break
                    case 'd': this.direcao.direita = false; break
                }
            },

            tick: function() {
                const pos = this.el.object3D.position
                const rot = this.el.object3D.rotation
                
                if(this.direcao.frente) pos.x += this.data.vel
                if(this.direcao.tras) pos.x -= this.data.vel
                if(this.direcao.esquerda) pos.z += this.data.vel
                if(this.direcao.direita) pos.z -= this.data.vel

                camera.object3D.position.set(pos.x-8, pos.y+5, pos.z)
            },

            remove: function () {
                window.removeEventListener('keydown', this.onKeyDown)
                window.removeEventListener('keyup', this.onKeyUp)
            }
        })
    </script>
    
    <title>Projeto 01 - LoP</title>
</head>

<body>
    <a-scene>
        <a-assets>
            <img id="grama" src="./assets/grama-02.png">
            <img id="ceu" src="./assets/sky.jpg">
            <img id="carro" src="./assets/carro.png">
        </a-assets>

        <!-- <a-box position="0 1 0" rotation="0 90 0" color="yellow" width="3" height="1" depth="6"></a-box>
            <a-cylinder position="2 0.5 0" rotation="0 90 90" radius="0.5" height="3.1" color="#000"></a-cylinder>
            <a-cylinder position="-2 0.5 0" rotation="0 90 90" radius="0.5" height="3.1" color="#000"></a-cylinder>
        </a-box> -->
        <a-box
            position="0 1 0"
            scale="4 2 2"
            dynamic-body
            mycar
            material="color: #FFF;
                        src: #carro"   
        ></a-box>
        <a-entity id="camera" camera look-controls wads-controls="enabled:false" position="0 2 10"></a-entity>
        <a-entity 
            geometry="primitive: plane; width: 200; height: 200"
            position="0 0 10" 
            rotation="-90 0 0" 
            material="color: #00ff00;
                        src: #grama;
                        repeat: 20 30;
                        normalMap: #grama;
                        normalTextureRepeat: 20 30;"
            static-body
        ></a-entity>
        <a-sky 
            src="#ceu"
            radius="80"
            side="double"
        ></a-sky>
    </a-scene>
</body>

</html>
