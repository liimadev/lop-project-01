<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style/cores.css">
    <title>Projeto 01 - LoP</title>
</head>
<style>
    :root {
        --primaria: #FC6203;
    }

    * {
        font-family: "Inter", sans-serif;
        margin: 0;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #000;
    }

    h1 {
        font-size: 42px;
        margin-top: 8vh;
        color: #fff;
    }

    h2 {
        font-size: 16px;
        text-transform: uppercase;
        font-weight: 400;
        letter-spacing: 5px;
        margin-top: 5px;
        color: var(--primaria);
    }

    .botoes {
        display: flex;
        flex-direction: column;
        width: 20%;
        padding: 5vh 20px;
        margin-inline: auto;
        margin-top: 20vh;
        justify-content: center;
        align-items: center;
    }
    .btn {
        outline: none;
        padding: 10px 15px;
        border: 1px solid var(--primaria);
        border-radius: 5px;
        text-decoration: none;
        background-color: var(--primaria);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
        width: 80%;
        text-align: center;
    }
</style>
<body>
    <h1>Projeto 01</h1>
    <h2>Logíca de Programação</h2>
    <div class="botoes">
        <a href="" class="btn">Jogar</a>
        <a href="" class="btn">Créditos</a>
    </div>
</body>
</html>
